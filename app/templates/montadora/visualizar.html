{% extends 'base.html' %}
{% block page_title %}Montadora – {{ obj.nome }}{% endblock %}
{% block content %}
<div class="page-header">
  <h4>{{ obj.nome }}</h4>
  <a href="{{ url_for('montadora.listar') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Voltar</a>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <dl class="row mb-0">
      <dt class="col-sm-4">Nome</dt><dd class="col-sm-8">{{ obj.nome }}</dd>
      <dt class="col-sm-4">Ativo</dt><dd class="col-sm-8"><span class="{{ 'badge-ativo' if obj.ativo else 'badge-inativo' }}">{{ 'Ativo' if obj.ativo else 'Inativo' }}</span></dd>
      <dt class="col-sm-4">Criado em</dt><dd class="col-sm-8">{{ obj.criado_em.strftime('%d/%m/%Y %H:%M') }}</dd>
    </dl>
  </div>
  <div class="card-footer bg-white">
    <a href="{{ url_for('montadora.editar', id=obj.id) }}" class="btn btn-primary btn-sm"><i class="bi bi-pencil me-1"></i>Editar</a>
  </div>
</div>
{% endblock %}
