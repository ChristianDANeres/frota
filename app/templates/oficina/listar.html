{% extends 'base.html' %}

{% block page_title %}Oficinas{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Oficinas</h4>
    <a href="{{ url_for('oficina.novo') }}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Nova
    </a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CNPJ</th>
                    <th>Município</th>
                    <th>Telefone</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for r in registros %}
                <tr>
                    <td>{{ r.nome }}</td>
                    <td>{{ r.cnpj }}</td>
                    <td>{{ r.municipio }}</td>
                    <td>{{ r.telefone }}</td>
                    <td class="text-end">
                        <a href="{{ url_for('oficina.visualizar', id=r.id) }}" class="btn btn-sm btn-outline-secondary">Ver</a>
                        <a href="{{ url_for('oficina.editar', id=r.id) }}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <form action="{{ url_for('oficina.excluir', id=r.id) }}" method="post" class="d-inline">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Remover</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">Nenhum registro encontrado.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
