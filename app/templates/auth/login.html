<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - FROTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-sm border-0" style="max-width:420px;width:100%">
    <div class="card-body p-4">
      <h3 class="fw-bold mb-1">FROTA</h3>
      <p class="text-muted mb-4">Acesse o sistema</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
      {% endwith %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3"><label class="form-label">Usuário</label><input name="username" class="form-control" required autofocus></div>
        <div class="mb-3"><label class="form-label">Senha</label><input name="senha" type="password" class="form-control" required></div>
        <button class="btn btn-primary w-100">Entrar</button>
      </form>
      <div class="text-muted small mt-3">Primeiro acesso: admin / admin123</div>
    </div>
  </div>
</div>
</body>
</html>
