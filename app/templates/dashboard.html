{% extends 'base.html' %}
{% block page_title %}Acesso Rápido{% endblock %}
{% block title %}Acesso Rápido – FROTA{% endblock %}
{% block content %}
<div class="page-header">
  <h4><i class="bi bi-grid-3x3-gap me-2"></i>Acesso Rápido</h4>
</div>
<div class="row g-3">
  {% for menu in menus %}
  {% if menu.endpoint and menu.codigo != 'dashboard' %}
  <div class="col-sm-6 col-md-4 col-lg-3">
    <a class="card text-decoration-none h-100" href="{{ url_for(menu.endpoint) }}">
      <div class="card-body d-flex align-items-center gap-3">
        <div style="font-size:2rem; color:var(--accent)"><i class="bi {{ menu.icone or 'bi-grid' }}"></i></div>
        <div>
          <div class="fw-600" style="font-weight:600; color:#1a202c">{{ menu.nome }}</div>
        </div>
      </div>
    </a>
  </div>
  {% endif %}
  {% endfor %}
</div>
{% endblock %}
