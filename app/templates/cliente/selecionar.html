{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold">Selecionar cliente</h4>
        <p class="text-muted">Escolha a base de cliente para trabalhar no sistema.</p>
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <select name="cliente_id" class="form-select mb-3" required>
            {% for cliente in clientes %}<option value="{{ cliente.id }}">{{ cliente.nome }}</option>{% endfor %}
          </select>
          <button class="btn btn-primary">Continuar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
