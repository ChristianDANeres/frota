{% extends 'base.html' %}

{% block page_title %}Listagem de Cores{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Cores</h4>
    <a href="{{ url_for('cor.novo') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Nova Cor
    </a>
</div>
<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Ativo</th>
                    <th class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for obj in registros %}
                <tr>
                    <td>{{ obj.nome }}</td>
                    <td>
                        <span class="{{ 'badge-ativo' if obj.ativo else 'badge-inativo' }}">
                            {{ 'Ativo' if obj.ativo else 'Inativo' }}
                        </span>
                    </td>
                    <td class="text-end">
                        <a href="{{ url_for('cor.visualizar', id=obj.id) }}" class="btn btn-sm btn-outline-info" title="Visualizar">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a href="{{ url_for('cor.editar', id=obj.id) }}" class="btn btn-sm btn-outline-primary" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form action="{{ url_for('cor.excluir', id=obj.id) }}" method="POST" class="d-inline">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Excluir"
                                onclick="return confirm('Deseja excluir esta cor?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center text-muted py-3">Nenhuma cor cadastrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
